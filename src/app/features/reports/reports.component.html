<div class="space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h2 class="text-2xl font-semibold tracking-tight">Gestor de Reportes</h2>
      <p class="text-sm text-muted-foreground">Administra y genera reportes personalizados de tu workspace</p>
    </div>
    <div class="flex items-center gap-2">
      <button uiButton variant="outline" size="sm" (click)="load()" [disabled]="loading()">
        <ng-icon name="lucideRefreshCw" size="14" [class.animate-spin]="loading()" />
        Actualizar
      </button>
      <button uiButton size="sm" (click)="openCreateModal()">
        <ng-icon name="lucidePlus" size="14" />
        Nuevo Reporte
      </button>
    </div>
  </div>

  <ui-advanced-filters
    [fields]="filterFields()"
    [filters]="tableState().filters || {}"
    (filtersChange)="onFiltersChange($event)">
  </ui-advanced-filters>

  <div class="flex items-center gap-2 mb-4" *ngIf="savedViews().length > 0">
    <span class="text-sm font-medium text-slate-500">Saved Views:</span>
    <button *ngFor="let view of savedViews()"
            (click)="applySavedView(view)"
            [class.bg-blue-100]="activeViewId() === view.id"
            [class.text-blue-700]="activeViewId() === view.id"
            class="px-3 py-1 text-xs rounded-full border border-slate-200 hover:bg-slate-100 transition-colors">
      {{ view.viewName }}
    </button>
  </div>

  <div class="h-[650px]">
    <ui-data-table
      [columns]="tableColumns"
      [data]="reports()"
      [totalItems]="totalItems()"
      [loading]="loading()"
      [initialState]="tableState()"
      (stateChange)="onTableStateChange($event)"
      (onSaveView)="saveCurrentView('Custom View ' + (savedViews().length + 1))">
    </ui-data-table>
  </div>
</div>

<ng-template #formatTemplate let-item>
  <ui-badge [variant]="getFormatBadge(item.format)">{{ item.format }}</ui-badge>
</ng-template>

<ng-template #actionsTemplate let-item>
  <button uiButton variant="outline" size="sm" (click)="generateReport(item.id, item.format)">
    <ng-icon name="lucideDownload" size="14" />
    Generar
  </button>
</ng-template>

@if (showCreateModal()) {
  <app-report-create-modal (closed)="closeCreateModal()" (created)="onReportCreated()" />
}
