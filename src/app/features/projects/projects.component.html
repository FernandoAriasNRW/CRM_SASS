<div class="space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h2 class="text-2xl font-semibold tracking-tight">Proyectos</h2>
      <p class="text-sm text-muted-foreground">
        {{ (projects$ | async)?.length ?? 0 }} proyectos en total
      </p>
    </div>
    <div class="flex items-center gap-2">
      <button uiButton variant="outline" size="sm" (click)="loadProjects()">
        <ng-icon name="lucideRefreshCw" size="16" class="mr-2" />
        Actualizar
      </button>
      <button uiButton size="sm" (click)="openCreateModal()">
        <ng-icon name="lucidePlus" size="14" />
        Nuevo
      </button>
    </div>
  </div>

  <ui-advanced-filters
    [fields]="filterFields()"
    [filters]="tableState().filters || {}"
    (filtersChange)="onFiltersChange($event)">
  </ui-advanced-filters>

  <div class="flex items-center gap-2 mb-4" *ngIf="savedViews().length > 0">
    <span class="text-sm font-medium text-slate-500">Saved Views:</span>
    <button *ngFor="let view of savedViews()"
            (click)="applySavedView(view)"
            [class.bg-blue-100]="activeViewId() === view.id"
            [class.text-blue-700]="activeViewId() === view.id"
            class="px-3 py-1 text-xs rounded-full border border-slate-200 hover:bg-slate-100 transition-colors">
      {{ view.viewName }}
    </button>
  </div>

  <div class="h-[650px]">
    <ui-data-table
      [columns]="tableColumns"
      [data]="projects()"
      [totalItems]="totalItems()"
      [loading]="isLoading()"
      [initialState]="tableState()"
      (stateChange)="onTableStateChange($event)"
      (rowClick)="openDetailModal($event)"
      (onSaveView)="saveCurrentView('Custom View ' + (savedViews().length + 1))">
    </ui-data-table>
  </div>
</div>

<ng-template #statusTemplate let-item>
  <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium" [class]="statusStyle(item.status)">
    {{ item.status }}
  </span>
</ng-template>

<ng-template #actionsTemplate let-item>
  <button (click)="$event.stopPropagation(); openDetailModal(item)" class="p-2 text-muted-foreground hover:text-foreground hover:bg-muted rounded-md transition-colors" title="Ver detalle">
    <ng-icon name="lucideEye" size="16" />
  </button>
</ng-template>

@if (showCreateModal()) {
  <app-project-create-modal (closed)="closeCreateModal()" />
}

@if (selectedProject()) {
  <app-project-detail-modal [project]="selectedProject()!" (closed)="closeDetailModal()" />
}
