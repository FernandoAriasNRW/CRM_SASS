<div class="min-h-screen flex items-center justify-center bg-background px-4 py-12">
  @if (success()) {
    <ui-card class="w-full max-w-md text-center">
      <ui-card-header>
        <div class="flex justify-center mb-2">
          <div class="h-12 w-12 rounded-full bg-green-100 flex items-center justify-center">
            <span class="text-green-600 text-2xl">✓</span>
          </div>
        </div>
        <ui-card-title>Ticket enviado</ui-card-title>
        <ui-card-description>
          Hemos recibido tu solicitud. Recibirás un email de confirmación pronto.
        </ui-card-description>
      </ui-card-header>
      <ui-card-footer>
        <button uiButton variant="outline" class="w-full" (click)="success.set(false)">
          Enviar otro ticket
        </button>
      </ui-card-footer>
    </ui-card>
  } @else {
    <ui-card class="w-full max-w-lg">
      <ui-card-header>
        <ui-card-title>Formulario de soporte</ui-card-title>
        <ui-card-description>Completa el formulario y te contactaremos a la brevedad</ui-card-description>
      </ui-card-header>

      <ui-card-content>
        <form (ngSubmit)="submit()" class="space-y-4">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="space-y-1.5">
              <label uiLabel for="contactName">Nombre *</label>
              <input uiInput id="contactName" [(ngModel)]="contactName" name="contactName" placeholder="Tu nombre" />
            </div>
            <div class="space-y-1.5">
              <label uiLabel for="company">Empresa</label>
              <input uiInput id="company" [(ngModel)]="company" name="company" placeholder="Nombre de empresa" />
            </div>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="space-y-1.5">
              <label uiLabel for="contactEmail">Email *</label>
              <input uiInput id="contactEmail" type="email" [(ngModel)]="contactEmail" name="contactEmail" placeholder="tu@email.com" />
            </div>
            <div class="space-y-1.5">
              <label uiLabel for="contactPhone">Teléfono</label>
              <input uiInput id="contactPhone" [(ngModel)]="contactPhone" name="contactPhone" placeholder="+1 234 567 890" />
            </div>
          </div>

          <div class="space-y-1.5">
            <label uiLabel for="category">Categoría</label>
            <select id="category" [(ngModel)]="category" name="category"
                    class="flex h-9 w-full rounded-md border border-input bg-transparent px-3 py-1 text-sm shadow-sm focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring">
              @for (cat of categories; track cat) {
                <option [value]="cat">{{ cat }}</option>
              }
            </select>
          </div>

          <div class="space-y-1.5">
            <label uiLabel for="subject">Asunto *</label>
            <input uiInput id="subject" [(ngModel)]="subject" name="subject" placeholder="Describe brevemente tu problema" />
          </div>

          <div class="space-y-1.5">
            <label uiLabel for="message">Mensaje *</label>
            <textarea id="message" [(ngModel)]="message" name="message"
                      rows="4" placeholder="Describe tu problema con detalle..."
                      class="flex w-full rounded-md border border-input bg-transparent px-3 py-2 text-sm shadow-sm placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring resize-none">
            </textarea>
          </div>

          @if (error()) {
            <p class="text-sm text-destructive">{{ error() }}</p>
          }

          <button uiButton type="submit" class="w-full" [disabled]="loading()">
            {{ loading() ? 'Enviando...' : 'Enviar ticket' }}
          </button>
        </form>
      </ui-card-content>
    </ui-card>
  }
</div>
