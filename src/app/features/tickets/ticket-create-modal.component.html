<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 px-4">
  <div class="w-full max-w-lg rounded-lg border border-border bg-card shadow-xl">
    <div class="flex items-center justify-between px-6 py-4 border-b border-border">
      <h3 class="text-base font-semibold">Nuevo ticket</h3>
      <button (click)="close()" class="text-muted-foreground hover:text-foreground text-lg leading-none">&times;</button>
    </div>

    <div class="px-6 py-4 space-y-4">
      <div class="space-y-1.5">
        <label uiLabel for="t-title">Título *</label>
        <input uiInput id="t-title" [(ngModel)]="title" placeholder="Ej: Problema con facturación" />
      </div>

      <div class="space-y-1.5">
        <label uiLabel for="t-priority">Prioridad</label>
        <select id="t-priority" [(ngModel)]="priority"
                class="flex h-9 w-full rounded-md border border-input bg-transparent px-3 py-1 text-sm shadow-sm focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring">
          @for (p of priorities; track p) {
            <option [value]="p">{{ p }}</option>
          }
        </select>
      </div>

      <div class="space-y-1.5">
        <label uiLabel for="t-description">Descripción *</label>
        <textarea id="t-description" [(ngModel)]="description" rows="3"
                  placeholder="Describe el problema en detalle..."
                  class="flex w-full rounded-md border border-input bg-transparent px-3 py-2 text-sm shadow-sm placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring resize-none">
        </textarea>
      </div>

      @if (error()) {
        <p class="text-sm text-destructive">{{ error() }}</p>
      }
    </div>

    <div class="flex justify-end gap-2 px-6 py-4 border-t border-border">
      <button uiButton variant="outline" (click)="close()">Cancelar</button>
      <button uiButton (click)="submit()" [disabled]="loading()">
        {{ loading() ? 'Creando...' : 'Crear ticket' }}
      </button>
    </div>
  </div>
</div>
