<div class="max-w-2xl mx-auto p-6 space-y-6">
  <h1 class="text-2xl font-bold text-gray-900">Mi Perfil</h1>

  @if (user()) {
    <!-- User Info Card -->
    <div class="bg-white rounded-lg shadow border border-gray-200 overflow-hidden">
      <div class="p-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4">Información del Usuario</h2>
        <div class="flex items-center gap-4 mb-6">
          <div class="w-16 h-16 rounded-full bg-blue-100 flex items-center justify-center">
            <ng-icon name="lucideUser" class="w-8 h-8 text-blue-600" />
          </div>
          <div>
            <p class="text-lg font-medium text-gray-900">{{ user()!.name }}</p>
            <p class="text-sm text-gray-500">{{ user()!.email }}</p>
            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium mt-1"
              [class.bg-purple-100]="user()!.role === 'Admin'"
              [class.text-purple-800]="user()!.role === 'Admin'"
              [class.bg-gray-100]="user()!.role !== 'Admin'"
              [class.text-gray-800]="user()!.role !== 'Admin'">
              {{ user()!.role }}
            </span>
          </div>
        </div>
      </div>
    </div>

    <!-- Change Password Card -->
    <div class="bg-white rounded-lg shadow border border-gray-200 overflow-hidden">
      <div class="p-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center gap-2">
          <ng-icon name="lucideLock" class="w-4 h-4" />
          Cambiar Contraseña
        </h2>
        @if (passwordError()) {
          <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-md text-sm text-red-700">
            {{ passwordError() }}
          </div>
        }
        @if (passwordSuccess()) {
          <div class="mb-4 p-3 bg-green-50 border border-green-200 rounded-md text-sm text-green-700">
            {{ passwordSuccess() }}
          </div>
        }

        <div class="space-y-4">
          <div>
            <label for="currentPassword" class="block text-sm font-medium text-gray-700 mb-1">Contraseña Actual</label>
            <input
              id="currentPassword"
              type="password"
              [(ngModel)]="currentPassword"
              placeholder="Ingresa tu contraseña actual"
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
          <div>
            <label for="newPassword" class="block text-sm font-medium text-gray-700 mb-1">Nueva Contraseña</label>
            <input
              id="newPassword"
              type="password"
              [(ngModel)]="newPassword"
              placeholder="Mínimo 6 caracteres"
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
          <div>
            <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">Confirmar Nueva Contraseña</label>
            <input
              id="confirmPassword"
              type="password"
              [(ngModel)]="confirmPassword"
              placeholder="Repite la nueva contraseña"
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
          <button
            (click)="changePassword()"
            [disabled]="savingPassword()"
            class="inline-flex items-center px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition-colors disabled:opacity-50">
            @if (savingPassword()) {
              <span class="mr-2">Guardando...</span>
            } @else {
              <ng-icon name="lucideSave" class="w-4 h-4 mr-1" />
              <span>Guardar Nueva Contraseña</span>
            }
          </button>
        </div>
      </div>
    </div>

    <!-- Logout -->
    <div class="bg-white rounded-lg shadow border border-gray-200 overflow-hidden">
      <div class="p-6">
        <div class="flex justify-between items-center">
          <div>
            <p class="text-sm text-gray-500">Sesión activa</p>
          </div>
          <button
            (click)="logout()"
            class="inline-flex items-center px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700 transition-colors">
            <ng-icon name="lucideLogOut" class="w-4 h-4 mr-1" />
            Cerrar Sesión
          </button>
        </div>
      </div>
    </div>
  } @else {
    <p class="text-gray-500">Cargando información...</p>
  }
</div>
