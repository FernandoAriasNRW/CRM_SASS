@if (authStore.isAuthenticated()) {
  <div class="flex h-screen bg-background">
    <!-- Spacer para reservar el ancho en el grid principal sin empujar contenido -->
    <div class="w-16 shrink-0 hidden md:block"></div>

    <!-- Menú lateral fijo que se expande en hover (group) -->
    <aside
      class="fixed left-0 top-0 h-full bg-card border-r border-border transition-all duration-300 ease-in-out flex flex-col z-50 overflow-hidden w-16 hover:w-60 hover:shadow-xl group shrink-0"
    >
      <div class="flex items-center px-4 py-4 border-b border-border h-14 shrink-0">
        <div class="text-primary flex items-center justify-center shrink-0">
          <ng-icon name="lucideMenu" size="20" class="shrink-0 text-muted-foreground" />
        </div>
        <span class="font-bold text-sm text-foreground ml-3 opacity-0 group-hover:opacity-100 transition-opacity duration-200 group-hover:duration-300 group-hover:delay-100 whitespace-nowrap">
          CRM SaaS
        </span>
      </div>

      <nav class="flex-1 px-2 py-3 space-y-1 overflow-hidden">
        @for (item of navItems; track item.path) {
          <a
            [routerLink]="item.path"
            routerLinkActive="bg-accent text-foreground"
            [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
            class="flex items-center gap-3 px-3 py-2 rounded-md text-sm text-muted-foreground hover:bg-accent hover:text-foreground transition-colors overflow-hidden"
            [title]="item.label"
          >
            <ng-icon [name]="item.icon" size="20" class="shrink-0" />
            <span class="opacity-0 group-hover:opacity-100 transition-opacity duration-200 group-hover:duration-300 group-hover:delay-100 whitespace-nowrap">{{ item.label }}</span>
          </a>
        }

        @if (authStore.isAdmin()) {
          <div class="pt-4 mt-4 border-t border-border overflow-hidden">
            <span class="px-3 text-xs font-medium text-muted-foreground uppercase tracking-wider opacity-0 group-hover:opacity-100 transition-opacity duration-200 group-hover:duration-300 group-hover:delay-100 whitespace-nowrap block mb-2">
              Administración
            </span>
            <a
              routerLink="/admin/users"
              routerLinkActive="bg-accent text-foreground"
              class="flex items-center gap-3 px-3 py-2 rounded-md text-sm text-muted-foreground hover:bg-accent hover:text-foreground transition-colors overflow-hidden"
              title="Usuarios"
            >
              <ng-icon name="lucideSettings" size="20" class="shrink-0" />
              <span class="opacity-0 group-hover:opacity-100 transition-opacity duration-200 group-hover:duration-300 group-hover:delay-100 whitespace-nowrap">Usuarios</span>
            </a>
          </div>
        }
      </nav>

      <div class="px-2 py-3 border-t border-border overflow-hidden">
        <button
          (click)="logout()"
          class="flex items-center gap-3 px-3 py-2 w-full rounded-md text-sm text-muted-foreground hover:bg-destructive/10 hover:text-destructive transition-colors overflow-hidden"
          title="Cerrar sesión"
        >
          <ng-icon name="lucideLogOut" size="20" class="shrink-0" />
          <span class="opacity-0 group-hover:opacity-100 transition-opacity duration-200 group-hover:duration-300 group-hover:delay-100 whitespace-nowrap">Cerrar sesión</span>
        </button>
      </div>
    </aside>

    <div class="flex-1 flex flex-col overflow-hidden">
      <header class="h-14 border-b border-border bg-card flex items-center justify-between px-6 shrink-0">
        <h1 class="text-sm font-medium text-muted-foreground">CRM SaaS Suite</h1>
        <div class="flex items-center gap-4">
          @if (authStore.userInfo(); as user) {
            <button
              (click)="navigateToProfile()"
              class="flex items-center gap-2 text-sm text-muted-foreground hover:text-foreground transition-colors"
            >
              <ng-icon name="lucideUser" size="16" />
              <span class="hidden sm:inline">{{ user.name }}</span>
            </button>
          }
          <app-notifications />
        </div>
      </header>
      <main class="flex-1 overflow-auto p-6">
        <router-outlet />
      </main>
    </div>
  </div>
} @else {
  <router-outlet />
}

<!-- Toast notifications container - disponible en toda la app -->
<app-toast-container />
